<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EBS 한국기행 지도</title>
  <!-- 중요 리소스 미리 로드 -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js">
  <!-- Leaflet (빠른 CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/MarkerCluster.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/MarkerCluster.Default.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.min.js"></script>
  <style>
    /* ── 색상 변수 (Grove 스타일) ── */
    :root {
      --bg:       #F8FAFA;
      --surface:  #FFFFFF;
      --white:    #FFFFFF;
      --border:   #E0E8E4;
      --border2:  #D0DEDB;
      --accent:   #2D8659;
      --accent-d: #1F5A3F;
      --accent-l: #E8F4EF;
      --green:    #5CB376;
      --text:     #2C3E50;
      --text2:    #4A5F6E;
      --text3:    #8A96A3;
      --tag-bg:   #EEF4F1;
      --shadow:   rgba(45, 134, 89, 0.08);
      --shadow-m: rgba(45, 134, 89, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html { height: 100%; }
    body { height: 100%; overflow: hidden; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

    /* 글로벌 스크롤바 스타일 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; transition: background .2s; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    /* ═══════════════════════ HEADER ═══════════════════════ */
    #header {
      height: 56px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      position: relative; z-index: 1000;
    }

    /* 로고 */
    #logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #logo .ebs-badge {
      background: var(--accent); color: #fff;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.8px;
      padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
    }
    #logo h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); white-space: nowrap; letter-spacing: -0.3px; }
    #logo h1 em { color: var(--accent); font-style: normal; }

    /* 검색창 - 데스크탑: 헤더에 항상 표시 */
    #search-wrap {
      position: relative;
      flex: 1; max-width: 460px;
      display: flex; align-items: center;
    }
    #search {
      width: 100%; height: 38px;
      padding: 0 36px 0 38px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.9rem;
      outline: none; transition: all .2s;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.1); background: var(--white); }
    #search::placeholder { color: var(--text3); font-weight: 400; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 0.9rem; pointer-events: none;
    }
    #search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--text3); font-size: 0.8rem;
      width: 20px; height: 20px; display: none; align-items: center; justify-content: center;
      background: var(--border); border-radius: 50%;
      transition: all .2s; border: none;
    }
    #search-clear:hover { background: var(--text3); color: var(--white); }
    #search-clear.vis { display: flex; }

    /* 통계 */
    #stats {
      font-size: 0.8rem; color: var(--text2); font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
      display: block; /* 데스크탑에서 표시 */
    }
    @media (max-width: 768px) { #stats { display: none; } }

    /* 사이드바 토글 버튼 (모바일) */
    #list-toggle {
      display: none;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 8px var(--shadow-m);
    }

    /* 모바일 검색 버튼 (헤더 내 아이콘) */
    #mob-search-btn {
      display: none;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--bg); border: 1.5px solid var(--border);
      color: var(--text2); font-size: 1.1rem; cursor: pointer;
      flex-shrink: 0; align-items: center; justify-content: center;
      transition: all .2s;
    }
    #mob-search-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* 하단 Peek 바 (모바일: 선택 위치 최소 노출) */
    #bottom-peek {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--white);
      border-top: 1px solid var(--border);
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -3px 16px rgba(0,0,0,0.12);
      z-index: 650; padding: 8px 18px 14px;
      cursor: pointer;
    }
    #bottom-peek.vis { display: block; }
    #peek-handle { width: 38px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 9px; }
    #peek-row { display: flex; align-items: center; gap: 8px; }
    #peek-title { font-size: 0.92rem; font-weight: 700; color: var(--text); flex: 1; }
    #peek-meta { font-size: 0.78rem; color: var(--accent); font-weight: 600; }
    #peek-arrow { font-size: 0.75rem; color: var(--text3); margin-left: 4px; }

    /* ═══════════════════════ 검색 결과 드롭다운 ═══════════════════════ */
    #autocomplete {
      /* 데스크탑: 검색창 바로 아래 드롭다운 */
      position: absolute; top: calc(100% + 6px); left: 0;
      width: 100%; min-width: 340px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 12px; max-height: 72vh; overflow-y: auto;
      z-index: 3000; display: none; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.13);
    }
    #autocomplete.vis { display: flex; flex-direction: column; }
    #autocomplete::-webkit-scrollbar { width: 5px; }
    #autocomplete::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* 섹션 헤더 */
    .ac-section-hdr {
      padding: 8px 14px 4px;
      font-size: 0.72rem; font-weight: 700; color: var(--text3);
      letter-spacing: 0.4px; text-transform: uppercase;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .ac-section-hdr:first-child { border-top: none; }

    /* 결과 행 */
    .ac-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background .12s;
    }
    .ac-row:last-child { border-bottom: none; }
    .ac-row:hover, .ac-row.hi { background: var(--accent-l); }

    .ac-icon { font-size: 1rem; flex-shrink: 0; color: var(--accent); width: 20px; text-align: center; }
    .ac-play-icon { font-size: 0.7rem; color: var(--text3); }
    .ac-info { flex: 1; min-width: 0; }
    .ac-name { font-size: 0.9rem; color: var(--text); font-weight: 600; letter-spacing: -0.2px;
               white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ac-meta { font-size: 0.75rem; color: var(--text3); margin-top: 2px; }
    .ac-cnt  { font-size: 0.72rem; color: var(--white); font-weight: 700; flex-shrink: 0;
               background: var(--accent); border-radius: 10px; padding: 2px 7px; }

    /* 에피소드 하이라이트 */
    @keyframes ep-hl { from { background: #FFF3CD; } to { background: transparent; } }
    .ep-highlight { animation: ep-hl 2.5s ease-out forwards; border-left: 3px solid var(--accent) !important; }

    /* 모바일: 검색창 → 헤더 아래 오버레이로 전환 */
    @media (max-width: 768px) {
      /* 기본 상태: 숨김 */
      #search-wrap {
        display: none;
        position: fixed; top: 50px; left: 0; right: 0;
        max-width: none; flex: none;
        padding: 10px 14px;
        background: var(--white);
        border-bottom: 1px solid var(--border);
        box-shadow: 0 4px 16px rgba(0,0,0,0.13);
        z-index: 1300;
        align-items: center;
      }
      /* 활성 상태: 슬라이드다운 */
      #search-wrap.mob-active { display: flex; }
      #search { height: 42px; border-radius: 12px; font-size: 0.92rem; }

      /* autocomplete: 검색바 바로 아래 전체화면 */
      #autocomplete {
        position: fixed;
        top: calc(50px + 62px); left: 0; right: 0; bottom: 0;
        width: 100%; min-width: unset; max-width: none;
        max-height: none;
        border-radius: 0; border-left: none; border-right: none;
        transform: none; box-shadow: none;
        border-top: 1px solid var(--border);
        overflow-y: auto;
      }

      /* 검색 배경 오버레이 */
      #mob-search-overlay {
        display: none;
        position: fixed; inset: 0; top: 50px;
        background: rgba(0,0,0,0.25);
        z-index: 1200;
      }
      #mob-search-overlay.vis { display: block; }
    }

    /* ═══════════════════════ 지역 필터바 ═══════════════════════ */
    #region-bar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 7px 16px;
      display: flex; gap: 5px 7px; flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 999;
    }
    .rgn-btn {
      padding: 4px 11px; border-radius: 14px;
      background: transparent; border: 1.5px solid var(--border);
      color: var(--text2); font-size: 0.77rem; font-weight: 700;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      letter-spacing: -0.2px; line-height: 1.6;
    }
    .rgn-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .rgn-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
    @media (max-width: 768px) {
      #region-bar { flex-wrap: nowrap; overflow-x: auto; padding: 6px 12px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      #region-bar::-webkit-scrollbar { display: none; }
    }

    /* ═══════════════════════ LAYOUT ═══════════════════════ */
    #main { display: flex; flex: 1; min-height: 0; position: relative; overflow: hidden; }

    /* ═══════════════════════ MAP ═══════════════════════ */
    #map { flex: 1; z-index: 1; position: relative; }

    /* 부동형 검색 버튼 */
    #map-search-btn {
      position: absolute; top: 12px; left: 12px; z-index: 500;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--white);
      border: 1.5px solid var(--border);
      color: var(--text2);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px var(--shadow);
      transition: all .2s;
    }
    #map-search-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 3px 10px var(--shadow-m);
    }

    /* 연대 필터 (지도 위 오버레이) */
    #decade-filter {
      position: absolute; top: 58px; left: 12px; z-index: 500;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .dec-btn {
      padding: 7px 14px; border-radius: 20px;
      background: var(--white); border: 1.5px solid var(--border);
      color: var(--text2); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 2px 6px var(--shadow);
      letter-spacing: -0.2px;
    }
    .dec-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 3px 10px rgba(45, 134, 89, 0.3);
    }
    .dec-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* ═══════════════════════ SIDEBAR (데스크탑) ═══════════════════════ */
    #sidebar {
      width: 360px; min-width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .25s ease, transform .25s ease;
      z-index: 100;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.04);
    }
    #sidebar.closed { width: 0; min-width: 0; border: none; overflow: hidden; }

    /* ═══════════════════════ BOTTOM SHEET (모바일) ═══════════════════════ */
    /* 모바일 스타일은 미디어쿼리에서 재정의 */

    /* ── 사이드바 내부 ── */
    #sb-head {
      padding: 18px 18px 14px;
      background: linear-gradient(135deg, var(--white) 0%, var(--accent-l) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sb-location-icon { font-size: 1.3rem; margin-right: 7px; }
    #sb-title {
      font-size: 1.2rem; font-weight: 700; color: var(--text); padding-right: 28px;
      line-height: 1.4; letter-spacing: -0.3px;
    }
    #sb-meta {
      font-size: 0.8rem; color: var(--text2); margin-top: 6px; font-weight: 600;
      letter-spacing: 0.2px;
    }
    #sb-close {
      position: absolute; right: 12px; top: 12px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--tag-bg); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--text2); transition: all .2s;
    }
    #sb-close:hover {
      background: var(--accent);
      color: var(--white);
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.15);
    }

    /* 정렬 & 내부 검색 */
    #sb-toolbar {
      display: none;
      padding: 12px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 8px; align-items: center;
    }
    #sb-toolbar.vis { display: flex; }
    .sort-btn {
      padding: 6px 12px; border-radius: 6px;
      background: var(--white); border: 1.5px solid var(--border);
      color: var(--text3); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all .2s; letter-spacing: -0.2px;
    }
    .sort-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
      box-shadow: 0 2px 4px rgba(45, 134, 89, 0.15);
    }
    .sort-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    #ep-filter-wrap { flex: 1; position: relative; }
    #ep-filter {
      width: 100%; padding: 7px 12px; font-size: 0.8rem;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); outline: none;
      transition: all .2s;
    }
    #ep-filter:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.08);
      background: var(--white);
    }

    /* 에피소드 목록 */
    #ep-list { flex: 1; overflow-y: auto; }
    #ep-list::-webkit-scrollbar { width: 5px; }
    #ep-list::-webkit-scrollbar-track { background: transparent; }
    #ep-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; transition: background .2s; }
    #ep-list::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    .ep-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all .15s;
      background: var(--white);
    }
    .ep-card:hover {
      background: var(--accent-l);
      box-shadow: inset 0 0 8px rgba(45, 134, 89, 0.1);
    }
    .ep-card:last-child { border-bottom: none; }

    .ep-top { display: flex; align-items: center; gap: 8px; justify-content: space-between; margin-bottom: 10px; }
    .ep-num {
      font-size: 0.68rem; font-weight: 700; color: var(--white);
      background: var(--accent); padding: 3px 10px; border-radius: 4px;
      flex-shrink: 0; white-space: nowrap; letter-spacing: 0.3px;
    }
    .ep-date { font-size: 0.76rem; color: var(--text3); flex-shrink: 0; font-weight: 500; }
    .ep-title-text {
      font-size: 0.9rem; color: var(--text); line-height: 1.6; font-weight: 700;
      margin-bottom: 8px; letter-spacing: -0.3px;
    }
    .ep-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .ep-tag {
      font-size: 0.66rem; padding: 3px 9px;
      background: var(--tag-bg); border-radius: 12px; color: var(--text2);
      cursor: pointer; transition: all .2s; font-weight: 500;
    }
    .ep-tag:hover {
      background: var(--accent);
      color: var(--white);
      transform: translateY(-1px);
    }
    .ep-tag-series {
      background: var(--accent-l); color: var(--accent); font-weight: 600;
    }
    .ep-tag-series:hover {
      background: var(--accent);
      color: var(--white);
      transform: translateY(-1px);
    }
    .ep-play {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px; font-size: 0.75rem;
      color: var(--accent); font-weight: 700;
      padding: 6px 13px; border: 1.5px solid var(--accent);
      border-radius: 6px; text-decoration: none;
      background: var(--white); transition: all .2s;
      letter-spacing: 0.1px;
    }
    .ep-play:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.2);
      transform: translateY(-1px);
    }
    #ep-none { padding: 24px 14px; text-align: center; color: var(--text3); font-size: 0.84rem; }

    /* 빈 상태 */
    #sb-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 20px; gap: 12px; text-align: center;
    }
    .sb-empty-icon {
      font-size: 3.5rem; opacity: 0.6;
      margin-bottom: 8px; animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .sb-empty-text {
      font-size: 0.9rem; color: var(--text2); line-height: 1.8;
      font-weight: 500; letter-spacing: -0.2px;
    }

    /* 로딩 */
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--bg) 0%, rgba(248,250,250,0.98) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      color: var(--text2); font-size: 0.9rem; font-weight: 500;
      letter-spacing: -0.2px;
    }

    /* Leaflet 클러스터 기본 스타일 재정의 (그린톤) */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background: rgba(45, 134, 89, 0.15) !important;
    }
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      background: rgba(45, 134, 89, 0.75) !important;
      color: #fff !important; font-weight: 700 !important;
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.2) !important;
    }

    /* ═══════════════════════ 모바일 (<= 768px) ═══════════════════════ */
    @media (max-width: 768px) {
      /* 헤더 */
      #header { height: 50px; padding: 0 12px; gap: 8px; }
      #stats { display: none; }
      #list-toggle { display: flex; }
      #mob-search-btn { display: flex; }
      #logo h1 { font-size: 0.88rem; }
      #map-search-btn { display: none; } /* 헤더 검색버튼 있으므로 숨김 */

      /* 연대 필터 → 모바일에서 숨김 */
      #decade-filter { display: none; }

      /* 지역 필터바 */

        transition: height .32s cubic-bezier(.4,0,.2,1);

      .sort-btn { min-height: 36px; padding: 6px 14px; font-size: 0.8rem; }

      /* 바텀 peek 바 표시 */

    /* 데스크탑 (>768px) */
    @media (min-width: 769px) {
      #stats { display: block; }
      #list-toggle { display: none; }
      #sidebar { position: relative; transform: none !important; }

    /* 아주 작은 화면 */
    @media (max-width: 380px) {
      #logo .ebs-badge { display: none; }
      #header { gap: 7px; padding: 0 10px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->

<!-- ── 본문 ── -->
<div id="main">
  <div id="map">

<!-- 모바일 하단 Peek 바 (선택된 위치 미리보기) -->

<div id="loading" style="display:none">
  <div class="spinner"></div>
  <p>3,971편 한국기행 데이터 불러오는 중…</p>
</div>

<script>
/* ══════════════════════════════════════
   카카오 지도 API 키
   https://developers.kakao.com 에서 JavaScript 앱 키를 발급받아 입력하세요.
   허용 도메인에 yyjkim2.vercel.app 과 localhost 를 추가해야 합니다.
══════════════════════════════════════ */
const KAKAO_APP_KEY = '1c163e0b4817113266fad3df8ad8275c';

/* ══════════════════════════════════════
   Leaflet 지도 초기화
══════════════════════════════════════ */
const map = L.map('map', { zoomControl: true, maxZoom: 18, minZoom: 6 }).setView([36.5, 127.9], 7);

/* 타일 레이어 정의
   ※ vworld URL: {layer}/{style}/{format} 은 Leaflet 비표준 변수이므로
      Util.template이 throw하지 않도록 리터럴값으로 치환 */
const TILES = {
  vworld: L.tileLayer(
    'https://api.vworld.kr/req/wmts/1.0.0/Base/default/{z}/{y}/{x}.jpeg' +
    '?service=wmts&request=GetTile&version=1.0.0' +
    '&tilematrixset=GoogleMapsCompatible_Level' +
    '&key=65C984FC-F158-3893-8CB8-72406DFF13DC',
    { attribution: '© VWorld', minZoom: 6, maxZoom: 18 }
  ),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    minZoom: 6, maxZoom: 18
  }),
  carto: L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution: '© CartoDB', subdomains: 'abcd', minZoom: 6, maxZoom: 18 }
  ),
};
/* 기본 타일: CartoDB (API 키 불필요, 안정적) */
TILES.carto.addTo(map);
let _fallbackDone = true; // CartoDB가 기본이므로 폴백 불필요

/* ══════════════════════════════════════
   상태
══════════════════════════════════════ */
let ALL        = [];   // 전체 위치 데이터
let VISIBLE    = [];   // 필터 적용 후
let markerMap  = {};   // series_name → L.marker
let cluster    = null;
let activeLoc  = null;
let sortMode     = 'date-desc';
let decadeFilter = 'all';
let regionFilter = 'all';

/* 지역 → 검색 키워드 매핑 */
const REGIONS = {
  '서울': ['서울'], '부산': ['부산'], '대구': ['대구'], '인천': ['인천'],
  '광주': ['광주'], '대전': ['대전'], '울산': ['울산'], '세종': ['세종'],
  '경기': ['경기'], '강원': ['강원'],
  '충북': ['충북', '충청북'], '충남': ['충남', '충청남'],
  '경북': ['경북', '경상북'], '경남': ['경남', '경상남'],
  '전북': ['전북', '전라북'], '전남': ['전남', '전라남'],
  '제주': ['제주'],
};

/* ══════════════════════════════════════
   아이콘
══════════════════════════════════════ */
/* ── 위치 핀 아이콘 (SVG teardrop) ── */
const mkIcon = (sel = false) => {
  if (sel) {
    // 선택됨: 다홍색 핀 (30×40)
    return L.divIcon({
      html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 30 40" width="30" height="40"
               style="filter:drop-shadow(0 3px 6px rgba(0,0,0,0.38));overflow:visible">
        <path d="M15 1C9.48 1 5 5.48 5 11c0 7.5 10 28 10 28s10-20.5 10-28c0-5.52-4.48-10-10-10z"
              fill="#E63946" stroke="white" stroke-width="1.5"/>
        <circle cx="15" cy="11" r="5" fill="white"/>
        <circle cx="15" cy="11" r="2.5" fill="#E63946"/>
      </svg>`,
      className: '',
      iconSize:   [30, 40],
      iconAnchor: [15, 39],
    });
  } else {
    // 기본: 지역 필터 선택 시 다홍색, 전체일 때 하늘색
    const baseColor = (regionFilter !== 'all') ? '#E63946' : '#5AADE3';
    return L.divIcon({
      html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 30" width="22" height="30"
               style="filter:drop-shadow(0 2px 3px rgba(0,0,0,0.28));overflow:visible">
        <path d="M11 1C6.58 1 3 4.58 3 9c0 5.5 8 20 8 20s8-14.5 8-20c0-4.42-3.58-8-8-8z"
              fill="${baseColor}" stroke="white" stroke-width="1.3"/>
        <circle cx="11" cy="9" r="3.5" fill="white" opacity="0.95"/>
      </svg>`,
      className: '',
      iconSize:   [22, 30],
      iconAnchor: [11, 29],
    });
  }
};

/* ── 클러스터 아이콘 ── */
const clusterIcon = n => {
  const s  = n > 80 ? 48 : n > 30 ? 40 : 32;
  const r  = s / 2;
  const ri = r - 5;
  const fs = n > 80 ? 13 : n > 30 ? 12 : 11;
  const isRegion = regionFilter !== 'all';
  const fill   = isRegion
    ? (n > 80 ? '#B02030' : n > 30 ? '#CC2F3C' : '#E63946')
    : (n > 80 ? '#2A8FCC' : n > 30 ? '#3DA2D8' : '#5AADE3');
  const shadow = isRegion ? 'rgba(180,0,30,0.25)' : 'rgba(0,60,120,0.28)';
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${s} ${s}" width="${s}" height="${s}"
             style="filter:drop-shadow(0 2px 5px ${shadow});overflow:visible">
      <circle cx="${r}" cy="${r}" r="${r-1}" fill="${fill}" opacity="0.22"/>
      <circle cx="${r}" cy="${r}" r="${ri}" fill="${fill}"/>
      <text x="${r}" y="${r}" text-anchor="middle" dominant-baseline="central"
            font-size="${fs}" font-weight="800" font-family="'Malgun Gothic',sans-serif"
            fill="white">${n}</text>
    </svg>`,
    className: '',
    iconSize:   [s, s],
    iconAnchor: [r, r],
  });
};

/* ══════════════════════════════════════
   데이터 로드 (두 단계: 요약 → 상세)
══════════════════════════════════════ */
let FULL_DATA = null; // 상세 데이터 (백그라운드 로딩)

// 1단계: 요약 데이터 로드 (초기 지도 렌더링)
fetch('data/locations_summary.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    ALL     = data;
    VISIBLE = data;
    buildMap(data);
    updateStats(data);
    // 로딩 오버레이 숨김
    document.getElementById('loading').style.display = 'none';
  })
  .catch(err => {
    console.error('데이터 로드 실패:', err);
    const msg = (err && (err.message || String(err))) || '알 수 없는 오류';
    const loadEl = document.getElementById('loading');
    if (loadEl) {
      loadEl.style.display = 'flex';
      loadEl.innerHTML = `<p style="color:#c05;font-size:.9rem">데이터 로드 실패: ${msg}</p>`;
    }
  });

// 2단계: 상세 데이터를 백그라운드에서 로드
fetch('data/locations_v2.json')
  .then(r => r.json())
  .then(data => {
    FULL_DATA = data;
    applyFilters(); // 상세 데이터로 필터 재적용
    console.log('✓ 상세 데이터 로드 완료');
  })
  .catch(err => console.warn('상세 데이터 로드 실패:', err));

/* ══════════════════════════════════════
   마커 렌더링
══════════════════════════════════════ */
function buildMap(locs) {
  if (cluster) map.removeLayer(cluster);
  markerMap = {};

  cluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: c => {
      const total = c.getAllChildMarkers()
        .reduce((sum, m) => sum + (m.options._epCount || 1), 0);
      return clusterIcon(total);
    },
  });

  locs.forEach(loc => {
    const m = L.marker([loc.lat, loc.lng], { icon: mkIcon(), _epCount: loc.episode_count });
    const tipHtml = `<div style="font-weight:700;margin-bottom:2px;color:#111">${loc.display_name}</div>`
      + `<div style="font-weight:600;font-size:.78rem;color:#111">${loc.episode_count}편</div>`;
    m.bindTooltip(tipHtml, { direction: 'top', offset: [0, -7], className: 'tt-warm' });
    m.on('click', () => openSidebar(loc, m));
    markerMap[loc.display_name] = m;
    cluster.addLayer(m);
  });

  map.addLayer(cluster);
}

/* ══════════════════════════════════════
   통계
══════════════════════════════════════ */
function updateStats(locs) {
  const total = locs.reduce((s, l) => s + l.episode_count, 0);
  document.getElementById('stats').textContent = `${locs.length}개 지역 · ${total.toLocaleString()}편`;
}

/* ══════════════════════════════════════
   사이드바 열기
══════════════════════════════════════ */
function openSidebar(loc, markerEl) {
  // 이전 마커 리셋
  if (activeLoc && markerMap[activeLoc.display_name]) {
    markerMap[activeLoc.display_name].setIcon(mkIcon(false));
  }
  activeLoc = loc;
  if (markerEl) markerEl.setIcon(mkIcon(true));

  // 헤더 업데이트
  document.getElementById('sb-title').innerHTML =
    `<span class="sb-location-icon">📍</span>${loc.display_name}`;
  document.getElementById('sb-meta').textContent = `총 ${loc.episode_count}편`;

  // 툴바 & 목록
  document.getElementById('sb-toolbar').classList.add('vis');
  document.getElementById('sb-empty').style.display = 'none';
  document.getElementById('ep-filter').value = '';

  const epList = document.getElementById('ep-list');
  epList.style.display = 'block';

  // 에피소드 데이터 가져오기 (요약 데이터에는 episodes가 없으므로, 전체 데이터에서 찾기)
  let episodes = loc.episodes || [];
  if (!episodes.length && FULL_DATA) {
    const fullLoc = FULL_DATA.find(l => l.display_name === loc.display_name);
    if (fullLoc) {
      episodes = fullLoc.episodes;
      activeLoc = fullLoc; // activeLoc을 전체 데이터로 교체 (정렬/필터 동작에 필요)
    }
  }

  renderEpisodes(episodes, '', loc.display_name);

  // 사이드바 열기
  const sb = document.getElementById('sidebar');
  sb.classList.remove('closed');
  sb.classList.add('open');
  document.getElementById('bottom-peek').classList.remove('vis');
  closeMobileSearch();

  // 지도 이동 — 클러스터 안에 숨어 있어도 마커가 보이도록 zoomToShowLayer 사용
  const isMobile = window.innerWidth <= 768;
  if (markerEl && cluster) {
    cluster.zoomToShowLayer(markerEl, () => {
      // spiderify 후 아이콘이 재렌더될 수 있으므로 다시 설정
      if (activeLoc && activeLoc.display_name === loc.display_name) {
        markerEl.setIcon(mkIcon(true));
      }
    });
  } else {
    map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), isMobile ? 9 : 10), { animate: true });
  }
}

/* ══════════════════════════════════════
   에피소드 렌더링
══════════════════════════════════════ */
function renderEpisodes(eps, filterText, locationName = '') {
  const list = document.getElementById('ep-list');
  list.innerHTML = '';

  let items = [...eps];

  // 텍스트 필터
  const q = filterText.trim().toLowerCase();
  if (q) {
    items = items.filter(e =>
      (e.title || '').toLowerCase().includes(q) ||
      (e.subtitle || '').toLowerCase().includes(q) ||
      (e.keywords || []).some(k => k.toLowerCase().includes(q))
    );
  }

  // 정렬
  if (sortMode === 'date-desc') {
    items.sort((a, b) => (b.broadcast_date || '') < (a.broadcast_date || '') ? -1 : 1); // 최신순 (내림차순)
  } else {
    items.sort((a, b) => (a.broadcast_date || '') < (b.broadcast_date || '') ? -1 : 1); // 방영일 오름차순
  }

  if (!items.length) {
    list.innerHTML = '<div id="ep-none">검색 결과가 없습니다</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  items.forEach(ep => {
    const card = document.createElement('div');
    card.className = 'ep-card';

    const dateHtml = ep.broadcast_date
      ? `<span class="ep-date">${ep.broadcast_date}</span>` : '';
    const locBadge = locationName
      ? `<span class="ep-num">${locationName}</span>` : '';
    // 제목: "서울, 4부 도시, 낭만을 입다" 형태로 조합
    const subtitle = (ep.subtitle && ep.subtitle.trim()) ? ep.subtitle : '';
    const numPart  = ep.episode_number ? `${ep.episode_number}부` : '';
    const parts    = [ep.series_name, numPart, subtitle].filter(Boolean);
    const displayTitle = parts.join(' ') || ep.title;
    const kwTags = (ep.keywords || []).slice(0, 5)
      .map(k => `<span class="ep-tag" data-kw="${k}">${k}</span>`).join('');

    card.innerHTML = `
      <div class="ep-top">${locBadge}${dateHtml}</div>
      <div class="ep-title-text">${displayTitle}</div>
      ${kwTags ? `<div class="ep-tags">${kwTags}</div>` : ''}
      ${ep.service_url
        ? `<a class="ep-play" href="${ep.service_url}" target="_blank" rel="noopener">▶ EBS에서 보기</a>`
        : ''}`;

    // 태그 클릭 → 검색
    card.addEventListener('click', e => {
      const tag = e.target.closest('.ep-tag');
      if (tag && tag.dataset.kw) {
        e.stopPropagation();
        const kw = tag.dataset.kw;
        srchEl.value = kw;
        clrEl.classList.add('vis');
        acResults = doSearch(kw);
        renderAC(acResults);
        srchEl.focus();
        return;
      }
      // 카드 전체 클릭 → EBS 이동
      if (ep.service_url && !e.target.closest('.ep-play')) {
        window.open(ep.service_url, '_blank');
      }
    });
    if (ep.service_url) card.style.cursor = 'pointer';
    frag.appendChild(card);
  });
  list.appendChild(frag);
}

function applyFilters() {
  let filtered = FULL_DATA || ALL;

  // 1) 지역 필터
  if (regionFilter !== 'all') {
    const keys = REGIONS[regionFilter] || [regionFilter];
    filtered = filtered.filter(l => keys.some(k => l.display_name.includes(k)));
  }

  // 2) 연대 필터 (FULL_DATA 있을 때만)
  if (FULL_DATA && decadeFilter !== 'all') {
    if (decadeFilter === '2010s') {
      filtered = filtered.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2010' && e.broadcast_date < '2020'));
    } else if (decadeFilter === '2020s') {
      filtered = filtered.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2020' && e.broadcast_date < '2026'));
    } else if (decadeFilter === '2026') {
      filtered = filtered.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2026'));
    }
  }

  VISIBLE = filtered;
  buildMap(filtered);
  updateStats(filtered);
}

/* 지역 필터 초기화 (검색 결과 선택 시 호출) */
function resetRegionFilter() {
  if (regionFilter === 'all') return;
  regionFilter = 'all';
  document.querySelectorAll('.rgn-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.region === 'all'));
  applyFilters();
}

/* 검색 결과 선택 시 — 해당 위치가 현재 필터에 포함되면 유지, 아니면 초기화 */
function ensureLocationVisible(loc) {
  if (regionFilter === 'all') return;
  const keys = REGIONS[regionFilter] || [regionFilter];
  const isInFilter = keys.some(k => loc.display_name.includes(k));
  if (!isInFilter) {
    regionFilter = 'all';
    document.querySelectorAll('.rgn-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.region === 'all'));
    applyFilters();
  }
}

/* 지역 필터 버튼 */
/* 지역 필터 클릭 시 해당 마커 영역으로 지도 이동 */
function fitToRegion() {
  if (regionFilter === 'all') {
    map.setView([36.5, 127.9], 7, { animate: true });
    return;
  }
  if (!cluster) return;
  const layers = cluster.getLayers();
  if (!layers.length) return;
  try {
    map.fitBounds(cluster.getBounds(), { padding: [50, 50], maxZoom: 11, animate: true });
  } catch (e) { /* bounds 계산 불가 시 무시 */ }
}

// 결과 렌더링 — 지역 섹션 + 에피소드 섹션
function renderAC(results) {
  acEl.innerHTML = '';
  if (!results.length) { acEl.classList.remove('vis'); return; }

  const locs = results.filter(r => r.type === 'loc');
  const eps  = results.filter(r => r.type === 'ep');

  // ── 지역 섹션
  if (locs.length) {
    const hdr = document.createElement('div');
    hdr.className = 'ac-section-hdr';
    hdr.textContent = '📍 지역';
    acEl.appendChild(hdr);

    locs.forEach(item => {
      const row = document.createElement('div');
      row.className = 'ac-row';
      row.innerHTML = `
        <span class="ac-icon">📍</span>
        <div class="ac-info">
          <div class="ac-name">${item.loc.display_name}</div>
        </div>
        <span class="ac-cnt">${item.loc.episode_count}편</span>`;
      row.addEventListener('click', e => {
        e.stopPropagation();
        srchEl.value = item.loc.display_name;
        clrEl.classList.add('vis');
        acEl.classList.remove('vis');
        ensureLocationVisible(item.loc);
        openSidebar(item.loc, markerMap[item.loc.display_name]);
      });
      acEl.appendChild(row);
    });
  }

  // ── 에피소드 섹션
  if (eps.length) {
    const hdr = document.createElement('div');
    hdr.className = 'ac-section-hdr';
    hdr.textContent = '🎬 에피소드';
    acEl.appendChild(hdr);

    eps.forEach(item => {
      const row = document.createElement('div');
      row.className = 'ac-row';
      const numPart = item.ep.episode_number ? `${item.ep.episode_number}부` : '';
      const parts   = [item.ep.series_name, numPart, item.ep.subtitle].filter(Boolean);
      const dispTitle = parts.join(' ') || item.ep.title || '';

      row.innerHTML = `
        <span class="ac-icon ac-play-icon">▶</span>
        <div class="ac-info">
          <div class="ac-name">${dispTitle}</div>
          <div class="ac-meta">${item.loc.display_name}${item.ep.broadcast_date ? ' · ' + item.ep.broadcast_date : ''}</div>
        </div>`;
      row.addEventListener('click', e => {
        e.stopPropagation();
        srchEl.value = dispTitle;
        clrEl.classList.add('vis');
        acEl.classList.remove('vis');
        ensureLocationVisible(item.loc);
        openSidebarForEpisode(item.ep, item.loc);
      });
      acEl.appendChild(row);
    });
  }

  acEl.classList.add('vis');
  acIdx = -1;
}

// 에피소드 클릭 → 사이드바 열고 해당 카드 하이라이트
function openSidebarForEpisode(targetEp, loc) {
  openSidebar(loc, markerMap[loc.display_name]);
  setTimeout(() => {
    const numPart = targetEp.episode_number ? `${targetEp.episode_number}부` : '';
    const target  = [targetEp.series_name, numPart, targetEp.subtitle].filter(Boolean).join(' ')
                    || targetEp.title || '';
    document.querySelectorAll('#ep-list .ep-card').forEach(card => {
      const t = card.querySelector('.ep-title-text');
      if (t && t.textContent.trim() === target.trim()) {
        card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        card.classList.add('ep-highlight');
        setTimeout(() => card.classList.remove('ep-highlight'), 2500);
      }
    });
  }, 350);
}

// 검색 수행 — 지역명 + 에피소드 메타데이터 통합
function doSearch(q) {
  if (!q.trim()) return [];
  const lq = q.toLowerCase();
  const locResults = [];
  const epResults  = [];
  const dataSource = FULL_DATA || ALL;

  for (const loc of dataSource) {
    // ── 지역명 매칭
    const dn = loc.display_name.toLowerCase();
    if (dn.startsWith(lq))   locResults.push({ type: 'loc', loc, score: 10 });
    else if (dn.includes(lq)) locResults.push({ type: 'loc', loc, score: 8  });

    // ── 에피소드 메타데이터 매칭
    if (!loc.episodes) continue;
    for (const ep of loc.episodes) {
      const series = (ep.series_name    || '').toLowerCase();
      const sub    = (ep.subtitle       || '').toLowerCase();
      const title  = (ep.title          || '').toLowerCase();
      const kws    = (ep.keywords       || []).map(k => k.toLowerCase());
      const date   = (ep.broadcast_date || '').toLowerCase();

      let score = 0;
      if      (series.includes(lq))                  score = 6;
      else if (sub.includes(lq) || title.includes(lq)) score = 5;
      else if (kws.some(k => k.includes(lq)))        score = 4;
      else if (date.startsWith(lq))                  score = 3;

      if (score > 0) epResults.push({ type: 'ep', ep, loc, score });
    }
  }

  locResults.sort((a, b) => b.score - a.score || b.loc.episode_count - a.loc.episode_count);
  epResults.sort((a, b) => b.score - a.score || (b.ep.broadcast_date || '') > (a.ep.broadcast_date || '') ? 1 : -1);

  return [...locResults.slice(0, 5), ...epResults.slice(0, 10)];
}

// 키보드 탐색
srchEl.addEventListener('keydown', e => {
  const rows = acEl.querySelectorAll('.ac-row');
  if (!rows.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIdx = Math.min(acIdx + 1, rows.length - 1);
    rows.forEach((r, i) => r.classList.toggle('hi', i === acIdx));
    rows[acIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIdx = Math.max(acIdx - 1, 0);
    rows.forEach((r, i) => r.classList.toggle('hi', i === acIdx));
    rows[acIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIdx >= 0) rows[acIdx].click();
    else if (rows.length > 0) rows[0].click();
  } else if (e.key === 'Escape') {
    acEl.classList.remove('vis');
    srchEl.blur();
  }
});

/* ══════════════════════════════════════
   카카오맵 연동
══════════════════════════════════════ */
let kakaoMapInst = null;   // kakao.maps.Map 인스턴스
let kakaoMode    = false;  // 현재 카카오맵 모드 여부

/** Leaflet zoom → Kakao level 변환
 *  Kakao Maps는 내부적으로 512px HiDPI 타일 사용 → OSM 256px 대비 1레벨 오프셋
 *  Leaflet 7(한국 전체) → Kakao 13,  Leaflet 12(도시) → Kakao 8 */
function toKakaoLevel(z) { return Math.max(1, Math.min(14, 20 - z)); }

/** Leaflet → 카카오 단방향 동기화
 *  pointer-events:none 으로 카카오는 직접 조작 불가 → 양방향 싱크 불필요
 *  'move' 이벤트 사용으로 드래그 중에도 즉각 따라옴 */
function syncL2K() {
  if (!kakaoMapInst || !kakaoMode) return;
  const c = map.getCenter();
  kakaoMapInst.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
  kakaoMapInst.setLevel(toKakaoLevel(map.getZoom()), { animate: false });
}

/** 카카오맵 SDK 동적 로드 → 콜백 실행 */
function loadKakaoSDK(callback) {
  if (typeof kakao !== 'undefined' && kakao.maps) { callback(); return; }
  const s = document.createElement('script');
  s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false`;
  s.onerror = () => {
    console.warn('카카오맵 SDK 로드 실패. CartoDB로 전환합니다.');
    deactivateKakaoMode(true);
  };
  s.onload = () => kakao.maps.load(callback);
  document.head.appendChild(s);
}

/** 카카오맵 인스턴스 초기화 (최초 1회) */
function initKakaoInst() {
  if (kakaoMapInst) return;
  const container = document.getElementById('kakao-map-container');
  const c = map.getCenter();
  kakaoMapInst = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(c.lat, c.lng),
    level: toKakaoLevel(map.getZoom()),
  });
  // Leaflet → 카카오 단방향 동기화 (드래그 중 실시간 반영)
  map.on('move zoom', syncL2K);
}

/** 카카오맵 모드 활성화 */
function activateKakaoMode() {
  if (!KAKAO_APP_KEY) {
    alert('KAKAO_APP_KEY가 비어 있습니다.\nindex.html 상단의 KAKAO_APP_KEY 값을 설정해주세요.');
    deactivateKakaoMode(true);
    return;
  }

  // ① 컨테이너를 먼저 표시해야 Kakao가 올바른 크기로 초기화됨 (0×0 방지)
  const container = document.getElementById('kakao-map-container');
  container.style.display = 'block';
  document.body.classList.add('kakao-mode');
  Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });

  loadKakaoSDK(() => {
    // ② 컨테이너가 이미 visible → 정확한 크기로 초기화
    initKakaoInst();
    kakaoMode = true;

    // ③ 초기 위치 동기화
    syncL2K();

    // ④ 브라우저 렌더링 완료 후 레이아웃 재계산 & 재동기화
    requestAnimationFrame(() => {
      kakaoMapInst.relayout();
      syncL2K();
    });
    _fallbackDone = true;
  });
}

/** 카카오맵 모드 비활성화 */
function deactivateKakaoMode(restoreCarto = false) {
  kakaoMode = false;
  document.getElementById('kakao-map-container').style.display = 'none';
  document.body.classList.remove('kakao-mode');
  if (restoreCarto) {
    TILES.carto.addTo(map);
    switcherEl.querySelectorAll('.tile-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tile === 'carto'));
  }
}

/* ── 타일 전환 UI ── */
const switcherEl = document.createElement('div');
switcherEl.id = 'tile-switcher';
switcherEl.innerHTML = `
  <button class="tile-btn active" data-tile="kakao">🟡 카카오맵</button>
  <button class="tile-btn" data-tile="vworld">🗺️ 브이월드</button>
  <button class="tile-btn" data-tile="osm">🌐 OSM</button>
  <button class="tile-btn" data-tile="carto">🎨 밝은지도</button>
`;
document.getElementById('map').appendChild(switcherEl);

switcherEl.querySelectorAll('.tile-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.tile;

    // 버튼 상태 먼저 갱신
    switcherEl.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (key === 'kakao') {
      // 카카오맵 모드로 전환
      deactivateKakaoMode(false);  // 기존 Leaflet 타일 제거
      Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
      activateKakaoMode();
    } else {
      // 일반 Leaflet 타일 모드
      deactivateKakaoMode(false);
      Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
      TILES[key].addTo(map);
      document.body.classList.toggle('tile-osm', key === 'osm');
      _fallbackDone = (key !== 'vworld');
    }
  });
});

/* 페이지 로드 시 카카오맵을 기본으로 활성화 */
activateKakaoMode();
</script>
