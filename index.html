<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>EBS 한국기행 지도</title>
  <!-- 중요 리소스 미리 로드 -->
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <link rel="preload" as="script" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js">
  <!-- Leaflet (빠른 CDN) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>
  <!-- Leaflet MarkerCluster -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/MarkerCluster.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/MarkerCluster.Default.min.css">
  <script src="https://cdn.jsdelivr.net/npm/leaflet.markercluster@1.5.1/dist/leaflet.markercluster.min.js"></script>
  <style>
    /* ── 색상 변수 (Grove 스타일) ── */
    :root {
      --bg:       #F8FAFA;
      --surface:  #FFFFFF;
      --white:    #FFFFFF;
      --border:   #E0E8E4;
      --border2:  #D0DEDB;
      --accent:   #2D8659;
      --accent-d: #1F5A3F;
      --accent-l: #E8F4EF;
      --green:    #5CB376;
      --text:     #2C3E50;
      --text2:    #4A5F6E;
      --text3:    #8A96A3;
      --tag-bg:   #EEF4F1;
      --shadow:   rgba(45, 134, 89, 0.08);
      --shadow-m: rgba(45, 134, 89, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); }

    /* 글로벌 스크롤바 스타일 */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; transition: background .2s; }
    ::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    /* ═══════════════════════ HEADER ═══════════════════════ */
    #header {
      height: 56px;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 2px 8px var(--shadow);
      display: flex; align-items: center; gap: 12px;
      padding: 0 16px;
      position: relative; z-index: 1000;
    }

    /* 로고 */
    #logo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    #logo .ebs-badge {
      background: var(--accent); color: #fff;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.8px;
      padding: 3px 8px; border-radius: 4px; flex-shrink: 0;
    }
    #logo h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); white-space: nowrap; letter-spacing: -0.3px; }
    #logo h1 em { color: var(--accent); font-style: normal; }

    /* 검색창 */
    #search-wrap { position: absolute; width: 0; height: 0; overflow: hidden; visibility: hidden; }
    #search {
      width: 100%; height: 38px;
      padding: 0 36px 0 38px;
      background: var(--bg); border: 1.5px solid var(--border);
      border-radius: 20px; color: var(--text); font-size: 0.9rem;
      outline: none; transition: all .2s;
    }
    #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.1); background: var(--white); }
    #search::placeholder { color: var(--text3); font-weight: 400; }
    .search-icon {
      position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 0.9rem; pointer-events: none;
    }
    #search-clear {
      position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
      cursor: pointer; color: var(--text3); font-size: 0.8rem;
      width: 20px; height: 20px; display: none; align-items: center; justify-content: center;
      background: var(--border); border-radius: 50%;
      transition: all .2s; border: none;
    }
    #search-clear:hover { background: var(--text3); color: var(--white); }
    #search-clear.vis { display: flex; }

    /* 통계 */
    #stats {
      font-size: 0.8rem; color: var(--text2); font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
      display: none; /* 모바일에서 숨김 */
    }

    /* 사이드바 토글 버튼 (모바일) */
    #list-toggle {
      display: none;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--accent); color: #fff; border: none;
      font-size: 1rem; cursor: pointer; flex-shrink: 0;
      align-items: center; justify-content: center;
      box-shadow: 0 2px 8px var(--shadow-m);
    }

    /* ═══════════════════════ 자동완성 (카드 패널) ═══════════════════════ */
    #autocomplete {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 90%; max-width: 360px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 16px; max-height: 70vh; overflow: hidden;
      z-index: 3000; display: none; flex-direction: column;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
    }
    #autocomplete.vis { display: flex; }

    /* 자동완성 헤더 */
    .ac-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .ac-title { font-size: 0.85rem; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
    .ac-subtitle { font-size: 1rem; color: var(--text); font-weight: 700; margin-top: 4px; }

    /* 자동완성 결과 목록 */
    .ac-list { flex: 1; overflow-y: auto; }
    .ac-list::-webkit-scrollbar { width: 5px; }
    .ac-list::-webkit-scrollbar-track { background: transparent; }
    .ac-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .ac-row {
      display: flex; flex-direction: column; gap: 8px;
      padding: 12px 14px; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: all .15s;
    }
    .ac-row:last-child { border-bottom: none; }
    .ac-row:hover, .ac-row.hi { background: var(--accent-l); }

    .ac-row-main { display: flex; align-items: baseline; gap: 8px; }
    .ac-icon { font-size: 1rem; flex-shrink: 0; color: var(--accent); }
    .ac-info { flex: 1; min-width: 0; }
    .ac-name { font-size: 0.92rem; color: var(--text); font-weight: 700; letter-spacing: -0.2px; }
    .ac-cnt { font-size: 0.75rem; color: var(--accent); font-weight: 700; flex-shrink: 0; }

    /* 자동완성 필터 */
    .ac-footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      display: flex; flex-wrap: wrap; gap: 7px;
    }
    .ac-tag {
      font-size: 0.73rem; padding: 5px 12px;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 12px; color: var(--text2);
      cursor: pointer; transition: all .2s; font-weight: 500;
    }
    .ac-tag:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-l);
    }

    /* ═══════════════════════ LAYOUT ═══════════════════════ */
    #main { display: flex; height: calc(100vh - 56px); position: relative; overflow: hidden; }

    /* ═══════════════════════ MAP ═══════════════════════ */
    #map { flex: 1; z-index: 1; position: relative; }

    /* 부동형 검색 버튼 */
    #map-search-btn {
      position: absolute; top: 12px; left: 12px; z-index: 500;
      width: 38px; height: 38px;
      border-radius: 50%;
      background: var(--white);
      border: 1.5px solid var(--border);
      color: var(--text2);
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 6px var(--shadow);
      transition: all .2s;
    }
    #map-search-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 3px 10px var(--shadow-m);
    }

    /* 연대 필터 (지도 위 오버레이) */
    #decade-filter {
      position: absolute; top: 58px; left: 12px; z-index: 500;
      display: flex; gap: 6px; flex-wrap: wrap;
    }
    .dec-btn {
      padding: 7px 14px; border-radius: 20px;
      background: var(--white); border: 1.5px solid var(--border);
      color: var(--text2); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
      box-shadow: 0 2px 6px var(--shadow);
      letter-spacing: -0.2px;
    }
    .dec-btn.active {
      background: var(--accent); border-color: var(--accent);
      color: #fff; box-shadow: 0 3px 10px rgba(45, 134, 89, 0.3);
    }
    .dec-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* ═══════════════════════ SIDEBAR (데스크탑) ═══════════════════════ */
    #sidebar {
      width: 360px; min-width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
      transition: width .25s ease, transform .25s ease;
      z-index: 100;
      box-shadow: -2px 0 8px rgba(0, 0, 0, 0.04);
    }
    #sidebar.closed { width: 0; min-width: 0; border: none; overflow: hidden; }

    /* ═══════════════════════ BOTTOM SHEET (모바일) ═══════════════════════ */
    /* 모바일 스타일은 미디어쿼리에서 재정의 */

    /* ── 사이드바 내부 ── */
    #sb-head {
      padding: 18px 18px 14px;
      background: linear-gradient(135deg, var(--white) 0%, var(--accent-l) 100%);
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .sb-location-icon { font-size: 1.3rem; margin-right: 7px; }
    #sb-title {
      font-size: 1.2rem; font-weight: 700; color: var(--text); padding-right: 28px;
      line-height: 1.4; letter-spacing: -0.3px;
    }
    #sb-meta {
      font-size: 0.8rem; color: var(--text2); margin-top: 6px; font-weight: 600;
      letter-spacing: 0.2px;
    }
    #sb-close {
      position: absolute; right: 12px; top: 12px;
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--tag-bg); border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; color: var(--text2); transition: all .2s;
    }
    #sb-close:hover {
      background: var(--accent);
      color: var(--white);
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.15);
    }

    /* 정렬 & 내부 검색 */
    #sb-toolbar {
      display: none;
      padding: 12px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      gap: 8px; align-items: center;
    }
    #sb-toolbar.vis { display: flex; }
    .sort-btn {
      padding: 6px 12px; border-radius: 6px;
      background: var(--white); border: 1.5px solid var(--border);
      color: var(--text3); font-size: 0.75rem; font-weight: 600;
      cursor: pointer; transition: all .2s; letter-spacing: -0.2px;
    }
    .sort-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--white);
      box-shadow: 0 2px 4px rgba(45, 134, 89, 0.15);
    }
    .sort-btn:hover:not(.active) {
      border-color: var(--accent);
      color: var(--accent);
    }
    #ep-filter-wrap { flex: 1; position: relative; }
    #ep-filter {
      width: 100%; padding: 7px 12px; font-size: 0.8rem;
      background: var(--white); border: 1.5px solid var(--border);
      border-radius: 8px; color: var(--text); outline: none;
      transition: all .2s;
    }
    #ep-filter:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45, 134, 89, 0.08);
      background: var(--white);
    }

    /* 에피소드 목록 */
    #ep-list { flex: 1; overflow-y: auto; }
    #ep-list::-webkit-scrollbar { width: 5px; }
    #ep-list::-webkit-scrollbar-track { background: transparent; }
    #ep-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; transition: background .2s; }
    #ep-list::-webkit-scrollbar-thumb:hover { background: var(--border2); }

    .ep-card {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer; transition: all .15s;
      background: var(--white);
    }
    .ep-card:hover {
      background: var(--accent-l);
      box-shadow: inset 0 0 8px rgba(45, 134, 89, 0.1);
    }
    .ep-card:last-child { border-bottom: none; }

    .ep-top { display: flex; align-items: center; gap: 8px; justify-content: space-between; margin-bottom: 10px; }
    .ep-num {
      font-size: 0.68rem; font-weight: 700; color: var(--white);
      background: var(--accent); padding: 3px 10px; border-radius: 4px;
      flex-shrink: 0; white-space: nowrap; letter-spacing: 0.3px;
    }
    .ep-date { font-size: 0.76rem; color: var(--text3); flex-shrink: 0; font-weight: 500; }
    .ep-title-text {
      font-size: 0.9rem; color: var(--text); line-height: 1.6; font-weight: 700;
      margin-bottom: 8px; letter-spacing: -0.3px;
    }
    .ep-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 7px; }
    .ep-tag {
      font-size: 0.66rem; padding: 3px 9px;
      background: var(--tag-bg); border-radius: 12px; color: var(--text2);
      cursor: pointer; transition: all .2s; font-weight: 500;
    }
    .ep-tag:hover {
      background: var(--accent);
      color: var(--white);
      transform: translateY(-1px);
    }
    .ep-tag-series {
      background: var(--accent-l); color: var(--accent); font-weight: 600;
    }
    .ep-tag-series:hover {
      background: var(--accent);
      color: var(--white);
      transform: translateY(-1px);
    }
    .ep-play {
      display: inline-flex; align-items: center; gap: 4px;
      margin-top: 10px; font-size: 0.75rem;
      color: var(--accent); font-weight: 700;
      padding: 6px 13px; border: 1.5px solid var(--accent);
      border-radius: 6px; text-decoration: none;
      background: var(--white); transition: all .2s;
      letter-spacing: 0.1px;
    }
    .ep-play:hover {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.2);
      transform: translateY(-1px);
    }
    #ep-none { padding: 24px 14px; text-align: center; color: var(--text3); font-size: 0.84rem; }

    /* 빈 상태 */
    #sb-empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 30px 20px; gap: 12px; text-align: center;
    }
    .sb-empty-icon {
      font-size: 3.5rem; opacity: 0.6;
      margin-bottom: 8px; animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    .sb-empty-text {
      font-size: 0.9rem; color: var(--text2); line-height: 1.8;
      font-weight: 500; letter-spacing: -0.2px;
    }

    /* 로딩 */
    #loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, var(--bg) 0%, rgba(248,250,250,0.98) 100%);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; gap: 16px;
    }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-right-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s cubic-bezier(0.4, 0.0, 0.2, 1) infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading p {
      color: var(--text2); font-size: 0.9rem; font-weight: 500;
      letter-spacing: -0.2px;
    }

    /* Leaflet 클러스터 기본 스타일 재정의 (그린톤) */
    .marker-cluster-small,
    .marker-cluster-medium,
    .marker-cluster-large {
      background: rgba(45, 134, 89, 0.15) !important;
    }
    .marker-cluster-small div,
    .marker-cluster-medium div,
    .marker-cluster-large div {
      background: rgba(45, 134, 89, 0.75) !important;
      color: #fff !important; font-weight: 700 !important;
      box-shadow: 0 2px 6px rgba(45, 134, 89, 0.2) !important;
    }

    /* ═══════════════════════ 모바일 (<= 768px) ═══════════════════════ */
    @media (max-width: 768px) {
      #stats { display: none; }
      #list-toggle { display: flex; }
      #logo h1 { font-size: 0.88rem; }

      /* 사이드바 → 바텀 시트 */
      #sidebar {
        position: fixed;
        left: 0; right: 0; bottom: 0;
        width: 100% !important; min-width: 0;
        height: 0;
        border-left: none;
        border-top: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
        box-shadow: 0 -4px 24px var(--shadow-m);
        transition: height .3s cubic-bezier(.4,0,.2,1);
        z-index: 700;
      }
      #sidebar.open {
        height: 72vh;
      }
      #sidebar.closed {
        height: 0; width: 100% !important;
      }

      /* 드래그 핸들 */
      #sb-head::before {
        content: '';
        display: block;
        width: 36px; height: 4px;
        background: var(--border2); border-radius: 2px;
        margin: 0 auto 10px;
      }
      #sb-close { top: 18px; }

      /* 연대 필터 */
      #decade-filter { top: 8px; left: 8px; gap: 4px; }
      .dec-btn { font-size: 0.72rem; padding: 4px 10px; }
    }

    /* 데스크탑 (>768px) */
    @media (min-width: 769px) {
      #stats { display: block; }
      #list-toggle { display: none; }
      #sidebar { position: relative; transform: none !important; }
      #sidebar.closed { width: 0; }
      #sidebar.open, #sidebar:not(.closed) { height: auto; }
    }

    /* 아주 작은 화면 */
    @media (max-width: 380px) {
      #logo .ebs-badge { display: none; }
      #header { gap: 7px; padding: 0 10px; }
    }
  </style>
</head>
<body>

<!-- ── 헤더 ── -->
<div id="header">
  <div id="logo">
    <span class="ebs-badge">EBS</span>
    <h1><em>한국기행</em> 지도</h1>
  </div>
  <div id="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="지역, 시리즈, 키워드 검색…" autocomplete="off" spellcheck="false">
    <span id="search-clear">✕</span>
  </div>
  <div id="stats">로딩 중…</div>
  <button id="list-toggle" title="목록 보기">☰</button>
</div>

<!-- ── 본문 ── -->
<div id="main">
  <div id="map">
    <!-- 카카오맵 배경 컨테이너 (Leaflet 마커 레이어 뒤에 위치) -->
    <div id="kakao-map-container"></div>
    <!-- 부동형 검색 버튼 -->
    <button id="map-search-btn" title="검색">🔍</button>
    <!-- 연대 필터 오버레이 -->
    <div id="decade-filter">
      <button class="dec-btn active" data-decade="all">전체</button>
      <button class="dec-btn" data-decade="2010s">2010년대</button>
      <button class="dec-btn" data-decade="2020s">2020년대</button>
      <button class="dec-btn" data-decade="2026">2026</button>
    </div>
  </div>

  <!-- ── 사이드바 / 바텀 시트 ── -->
  <div id="sidebar" class="closed">
    <div id="sb-head">
      <div id="sb-title"><span class="sb-location-icon">📍</span>지역을 선택하세요</div>
      <div id="sb-meta"></div>
      <button id="sb-close">✕</button>
    </div>
    <div id="sb-toolbar">
      <span style="font-size:.72rem;color:var(--text3);flex-shrink:0">정렬</span>
      <button class="sort-btn active" data-sort="date">방영일순</button>
      <button class="sort-btn" data-sort="ep">회차순</button>
      <div id="ep-filter-wrap">
        <input id="ep-filter" type="text" placeholder="에피소드 검색…">
      </div>
    </div>
    <div id="sb-empty">
      <div class="sb-empty-icon">🗾</div>
      <p class="sb-empty-text">지도에서 마커를 클릭하거나<br>위 검색창에서 지역을 입력하세요</p>
    </div>
    <div id="ep-list" style="display:none"></div>
  </div>
</div>

<div id="loading" style="display:none">
  <div class="spinner"></div>
  <p>3,971편 한국기행 데이터 불러오는 중…</p>
</div>

<!-- 부동형 검색 결과 모달 -->
<div id="autocomplete"></div>

<script>
/* ══════════════════════════════════════
   카카오 지도 API 키
   https://developers.kakao.com 에서 JavaScript 앱 키를 발급받아 입력하세요.
   허용 도메인에 yyjkim2.vercel.app 과 localhost 를 추가해야 합니다.
══════════════════════════════════════ */
const KAKAO_APP_KEY = '1c163e0b4817113266fad3df8ad8275c';

/* ══════════════════════════════════════
   Leaflet 지도 초기화
══════════════════════════════════════ */
const map = L.map('map', { zoomControl: true }).setView([36.5, 127.9], 7);

/* 타일 레이어 정의
   ※ vworld URL: {layer}/{style}/{format} 은 Leaflet 비표준 변수이므로
      Util.template이 throw하지 않도록 리터럴값으로 치환 */
const TILES = {
  vworld: L.tileLayer(
    'https://api.vworld.kr/req/wmts/1.0.0/Base/default/{z}/{y}/{x}.jpeg' +
    '?service=wmts&request=GetTile&version=1.0.0' +
    '&tilematrixset=GoogleMapsCompatible_Level' +
    '&key=65C984FC-F158-3893-8CB8-72406DFF13DC',
    { attribution: '© VWorld', minZoom: 6, maxZoom: 18 }
  ),
  osm: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    minZoom: 6, maxZoom: 18
  }),
  carto: L.tileLayer(
    'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',
    { attribution: '© CartoDB', subdomains: 'abcd', minZoom: 6, maxZoom: 18 }
  ),
};
/* 기본 타일: CartoDB (API 키 불필요, 안정적) */
TILES.carto.addTo(map);
let _fallbackDone = true; // CartoDB가 기본이므로 폴백 불필요

/* ══════════════════════════════════════
   상태
══════════════════════════════════════ */
let ALL        = [];   // 전체 위치 데이터
let VISIBLE    = [];   // 필터 적용 후
let markerMap  = {};   // series_name → L.marker
let cluster    = null;
let activeLoc  = null;
let sortMode   = 'date';
let decadeFilter = 'all';

/* ══════════════════════════════════════
   아이콘
══════════════════════════════════════ */
const mkIcon = (sel = false) => {
  const s = sel ? 16 : 11;
  const color = sel ? '#A06025' : '#C07A3A';
  const border = sel ? '#FFFFFF' : 'rgba(255,255,255,0.8)';
  return L.divIcon({
    html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};border:2px solid ${border};box-shadow:0 1px 5px rgba(80,40,0,0.35)"></div>`,
    className: '', iconSize: [s, s], iconAnchor: [s/2, s/2],
  });
};

const clusterIcon = n => {
  const s = n > 80 ? 46 : n > 30 ? 38 : 30;
  const opacity = n > 30 ? 0.88 : 0.78;
  return L.divIcon({
    html: `<div style="width:${s}px;height:${s}px;border-radius:50%;
             background:rgba(192,122,58,${opacity});
             border:2px solid rgba(255,255,255,0.75);
             display:flex;align-items:center;justify-content:center;
             font-size:${s>38?13:10}px;font-weight:800;color:#fff;
             box-shadow:0 2px 10px rgba(80,40,0,0.3)">${n}</div>`,
    className: '', iconSize: [s, s], iconAnchor: [s/2, s/2],
  });
};

/* ══════════════════════════════════════
   데이터 로드 (두 단계: 요약 → 상세)
══════════════════════════════════════ */
let FULL_DATA = null; // 상세 데이터 (백그라운드 로딩)

// 1단계: 요약 데이터 로드 (초기 지도 렌더링)
fetch('data/locations_summary.json')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  })
  .then(data => {
    ALL     = data;
    VISIBLE = data;
    buildMap(data);
    updateStats(data);
  })
  .catch(err => {
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('loading').innerHTML =
      `<p style="color:#c05;font-size:.9rem">데이터 로드 실패: ${err.message}</p>`;
  });

// 2단계: 상세 데이터를 백그라운드에서 로드
fetch('data/locations_v2.json')
  .then(r => r.json())
  .then(data => {
    FULL_DATA = data;
    console.log('✓ 상세 데이터 로드 완료');
  })
  .catch(err => console.warn('상세 데이터 로드 실패:', err));

/* ══════════════════════════════════════
   마커 렌더링
══════════════════════════════════════ */
function buildMap(locs) {
  if (cluster) map.removeLayer(cluster);
  markerMap = {};

  cluster = L.markerClusterGroup({
    maxClusterRadius: 40,
    spiderfyOnMaxZoom: true,
    showCoverageOnHover: false,
    iconCreateFunction: c => {
      const total = c.getAllChildMarkers()
        .reduce((sum, m) => sum + (m.options._epCount || 1), 0);
      return clusterIcon(total);
    },
  });

  locs.forEach(loc => {
    const m = L.marker([loc.lat, loc.lng], { icon: mkIcon(), _epCount: loc.episode_count });
    const tipHtml = `<div style="font-weight:700;margin-bottom:2px">${loc.display_name}</div>`
      + `<div style="color:#C07A3A;font-weight:700;font-size:.78rem">${loc.episode_count}편</div>`;
    m.bindTooltip(tipHtml, { direction: 'top', offset: [0, -7], className: 'tt-warm' });
    m.on('click', () => openSidebar(loc, m));
    markerMap[loc.display_name] = m;
    cluster.addLayer(m);
  });

  map.addLayer(cluster);
}

/* ══════════════════════════════════════
   통계
══════════════════════════════════════ */
function updateStats(locs) {
  const total = locs.reduce((s, l) => s + l.episode_count, 0);
  document.getElementById('stats').textContent = `${locs.length}개 지역 · ${total.toLocaleString()}편`;
}

/* ══════════════════════════════════════
   사이드바 열기
══════════════════════════════════════ */
function openSidebar(loc, markerEl) {
  // 이전 마커 리셋
  if (activeLoc && markerMap[activeLoc.display_name]) {
    markerMap[activeLoc.display_name].setIcon(mkIcon(false));
  }
  activeLoc = loc;
  if (markerEl) markerEl.setIcon(mkIcon(true));

  // 헤더 업데이트
  document.getElementById('sb-title').innerHTML =
    `<span class="sb-location-icon">📍</span>${loc.display_name}`;
  document.getElementById('sb-meta').textContent = `총 ${loc.episode_count}편`;

  // 툴바 & 목록
  document.getElementById('sb-toolbar').classList.add('vis');
  document.getElementById('sb-empty').style.display = 'none';
  document.getElementById('ep-filter').value = '';

  const epList = document.getElementById('ep-list');
  epList.style.display = 'block';

  // 에피소드 데이터 가져오기 (요약 데이터에는 episodes가 없으므로, 전체 데이터에서 찾기)
  let episodes = loc.episodes || [];
  if (!episodes.length && FULL_DATA) {
    const fullLoc = FULL_DATA.find(l => l.display_name === loc.display_name);
    if (fullLoc) {
      episodes = fullLoc.episodes;
      activeLoc = fullLoc; // activeLoc을 전체 데이터로 교체 (정렬/필터 동작에 필요)
    }
  }

  renderEpisodes(episodes, '', loc.display_name);

  // 사이드바 열기
  const sb = document.getElementById('sidebar');
  sb.classList.remove('closed');
  sb.classList.add('open');

  // 지도 이동
  const isMobile = window.innerWidth <= 768;
  if (!isMobile) {
    map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 10), { animate: true });
  } else {
    map.setView([loc.lat, loc.lng], Math.max(map.getZoom(), 9), { animate: true });
  }
}

/* ══════════════════════════════════════
   에피소드 렌더링
══════════════════════════════════════ */
function renderEpisodes(eps, filterText, locationName = '') {
  const list = document.getElementById('ep-list');
  list.innerHTML = '';

  let items = [...eps];

  // 텍스트 필터
  const q = filterText.trim().toLowerCase();
  if (q) {
    items = items.filter(e =>
      (e.title || '').toLowerCase().includes(q) ||
      (e.subtitle || '').toLowerCase().includes(q) ||
      (e.keywords || []).some(k => k.toLowerCase().includes(q))
    );
  }

  // 정렬
  if (sortMode === 'date') {
    items.sort((a, b) => (a.broadcast_date || '') < (b.broadcast_date || '') ? -1 : 1);
  } else {
    items.sort((a, b) => (a.episode_number || 999) - (b.episode_number || 999));
  }

  if (!items.length) {
    list.innerHTML = '<div id="ep-none">검색 결과가 없습니다</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  items.forEach(ep => {
    const card = document.createElement('div');
    card.className = 'ep-card';

    const dateHtml = ep.broadcast_date
      ? `<span class="ep-date">${ep.broadcast_date}</span>` : '';
    const locBadge = locationName
      ? `<span class="ep-num">${locationName}</span>` : '';
    // 제목: "서울, 4부 도시, 낭만을 입다" 형태로 조합
    const subtitle = (ep.subtitle && ep.subtitle.trim()) ? ep.subtitle : '';
    const numPart  = ep.episode_number ? `${ep.episode_number}부` : '';
    const parts    = [ep.series_name, numPart, subtitle].filter(Boolean);
    const displayTitle = parts.join(' ') || ep.title;
    const kwTags = (ep.keywords || []).slice(0, 5)
      .map(k => `<span class="ep-tag" data-kw="${k}">${k}</span>`).join('');

    card.innerHTML = `
      <div class="ep-top">${locBadge}${dateHtml}</div>
      <div class="ep-title-text">${displayTitle}</div>
      ${kwTags ? `<div class="ep-tags">${kwTags}</div>` : ''}
      ${ep.service_url
        ? `<a class="ep-play" href="${ep.service_url}" target="_blank" rel="noopener">▶ EBS에서 보기</a>`
        : ''}`;

    // 태그 클릭 → 검색
    card.addEventListener('click', e => {
      const tag = e.target.closest('.ep-tag');
      if (tag && tag.dataset.kw) {
        e.stopPropagation();
        const kw = tag.dataset.kw;
        srchEl.value = kw;
        clrEl.classList.add('vis');
        acResults = doSearch(kw);
        renderAC(acResults);
        srchEl.focus();
        return;
      }
      // 카드 전체 클릭 → EBS 이동
      if (ep.service_url && !e.target.closest('.ep-play')) {
        window.open(ep.service_url, '_blank');
      }
    });
    if (ep.service_url) card.style.cursor = 'pointer';
    frag.appendChild(card);
  });
  list.appendChild(frag);
}

/* ══════════════════════════════════════
   정렬 버튼
══════════════════════════════════════ */
document.querySelectorAll('.sort-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortMode = btn.dataset.sort;
    if (activeLoc) renderEpisodes(activeLoc.episodes, document.getElementById('ep-filter').value, activeLoc.display_name);
  });
});

/* ══════════════════════════════════════
   에피소드 내 검색
══════════════════════════════════════ */
document.getElementById('ep-filter').addEventListener('input', e => {
  if (activeLoc) renderEpisodes(activeLoc.episodes, e.target.value, activeLoc.display_name);
});

/* ══════════════════════════════════════
   연대 필터
══════════════════════════════════════ */
document.querySelectorAll('.dec-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.dec-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    decadeFilter = btn.dataset.decade;
    applyFilters();
  });
});

function applyFilters() {
  let filtered = ALL;
  // 연대 필터는 FULL_DATA가 있을 때만 작동 (요약 데이터에는 broadcast_date가 없음)
  if (FULL_DATA) {
    if (decadeFilter === '2010s') {
      filtered = FULL_DATA.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2010' && e.broadcast_date < '2020')
      );
    } else if (decadeFilter === '2020s') {
      filtered = FULL_DATA.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2020' && e.broadcast_date < '2026')
      );
    } else if (decadeFilter === '2026') {
      filtered = FULL_DATA.filter(l =>
        l.episodes.some(e => e.broadcast_date && e.broadcast_date >= '2026')
      );
    }
  }
  VISIBLE = filtered;
  buildMap(filtered);
  updateStats(filtered);
}

/* ══════════════════════════════════════
   검색 / 자동완성  (버그 수정)
══════════════════════════════════════ */
const srchEl  = document.getElementById('search');
const clrEl   = document.getElementById('search-clear');
const acEl    = document.getElementById('autocomplete');

let acResults = [];
let acIdx     = -1;

// 결과 렌더링 (카드 패널)
function renderAC(results) {
  acEl.innerHTML = '';
  if (!results.length) { acEl.classList.remove('vis'); return; }

  // 헤더
  const header = document.createElement('div');
  header.className = 'ac-header';
  header.innerHTML = `
    <div class="ac-title">EBS 한국기행</div>
    <div class="ac-subtitle">에피소드 검색</div>`;
  acEl.appendChild(header);

  // 결과 목록
  const list = document.createElement('div');
  list.className = 'ac-list';

  results.forEach((loc, i) => {
    const row = document.createElement('div');
    row.className = 'ac-row';
    row.dataset.idx = String(i);

    row.innerHTML = `
      <div class="ac-row-main">
        <span class="ac-icon">📍</span>
        <div class="ac-info">
          <div class="ac-name">${loc.display_name}</div>
        </div>
        <span class="ac-cnt">${loc.episode_count}편</span>
      </div>`;

    // ★ 클릭 핸들러
    row.addEventListener('click', (e) => {
      e.stopPropagation();
      const chosen = acResults[i];
      if (!chosen) return;
      srchEl.value = chosen.display_name;
      clrEl.classList.add('vis');
      acEl.classList.remove('vis');
      openSidebar(chosen, markerMap[chosen.display_name]);
    });

    list.appendChild(row);
  });
  acEl.appendChild(list);

  // 푸터 (카테고리 필터)
  const footer = document.createElement('div');
  footer.className = 'ac-footer';
  footer.innerHTML = `
    <span class="ac-tag">도시</span>
    <span class="ac-tag">유적지</span>
    <span class="ac-tag">랜드마크</span>
    <span class="ac-tag">자연</span>
    <span class="ac-tag">경험</span>
    <span class="ac-tag">음식</span>`;
  acEl.appendChild(footer);

  acEl.classList.add('vis');
  acIdx = -1;
}

// 검색 수행
function doSearch(q) {
  if (!q.trim()) return [];
  const lq = q.toLowerCase();
  const results = [];

  // FULL_DATA가 있으면 상세 검색, 없으면 위치명만 검색
  const dataSource = FULL_DATA || VISIBLE;

  for (const loc of dataSource) {
    let score = 0;
    if (loc.display_name.toLowerCase().startsWith(lq)) score = 4;
    else if (loc.display_name.toLowerCase().includes(lq)) score = 3;
    // 에피소드 기반 검색 (전체 데이터가 있을 때만)
    else if (loc.episodes && loc.episodes.some(e =>
      (e.series_name || '').toLowerCase().includes(lq) ||
      (e.subtitle || '').toLowerCase().includes(lq) ||
      (e.title || '').toLowerCase().includes(lq)
    )) score = 2;
    else if (loc.episodes && loc.episodes.some(e =>
      (e.keywords || []).some(k => k.toLowerCase().includes(lq))
    )) score = 1;
    if (score > 0) results.push({ loc, score });
  }
  results.sort((a, b) => b.score - a.score || b.loc.episode_count - a.loc.episode_count);
  return results.slice(0, 12).map(r => r.loc);
}

srchEl.addEventListener('input', () => {
  const q = srchEl.value;
  clrEl.classList.toggle('vis', q.trim().length > 0);

  if (!q.trim()) {
    acEl.classList.remove('vis');
    acResults = [];
    return;
  }

  acResults = doSearch(q);
  renderAC(acResults);
});

// 키보드 탐색
srchEl.addEventListener('keydown', e => {
  const rows = acEl.querySelectorAll('.ac-row');
  if (!rows.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acIdx = Math.min(acIdx + 1, rows.length - 1);
    rows.forEach((r, i) => r.classList.toggle('hi', i === acIdx));
    rows[acIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acIdx = Math.max(acIdx - 1, 0);
    rows.forEach((r, i) => r.classList.toggle('hi', i === acIdx));
    rows[acIdx]?.scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter') {
    e.preventDefault();
    if (acIdx >= 0) rows[acIdx].click();
    else if (rows.length > 0) rows[0].click();
  } else if (e.key === 'Escape') {
    acEl.classList.remove('vis');
    srchEl.blur();
  }
});

// 지우기 버튼
clrEl.addEventListener('click', () => {
  srchEl.value = '';
  clrEl.classList.remove('vis');
  acEl.classList.remove('vis');
  acResults = [];
  srchEl.focus();
});

// 맵 검색 버튼 (부동형)
document.getElementById('map-search-btn').addEventListener('click', () => {
  srchEl.focus();
  if (srchEl.value.trim()) {
    acEl.classList.add('vis');
  }
});

// 바깥 클릭 (모달 닫기)
document.addEventListener('click', e => {
  if (!e.target.closest('#autocomplete') && !e.target.closest('#search') && !e.target.closest('#map-search-btn')) {
    acEl.classList.remove('vis');
  }
});

/* ══════════════════════════════════════
   사이드바 닫기
══════════════════════════════════════ */
function closeSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.add('closed');
  sb.classList.remove('open');
  if (activeLoc && markerMap[activeLoc.display_name]) {
    markerMap[activeLoc.display_name].setIcon(mkIcon(false));
  }
  activeLoc = null;
}

document.getElementById('sb-close').addEventListener('click', closeSidebar);
document.getElementById('list-toggle').addEventListener('click', () => {
  const sb = document.getElementById('sidebar');
  if (sb.classList.contains('open') || !sb.classList.contains('closed')) {
    closeSidebar();
  } else {
    sb.classList.remove('closed');
    sb.classList.add('open');
  }
});

.tile-btn {
  padding: 6px 11px; border-radius: 6px;
  background: var(--white); border: 1.5px solid var(--border);
  color: var(--text2); font-size: 0.74rem; font-weight: 600;
  cursor: pointer; box-shadow: 0 2px 6px var(--shadow);
  transition: all .15s; white-space: nowrap; letter-spacing: -0.2px;
}
.tile-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 2px 8px rgba(45, 134, 89, 0.25); }
.tile-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
/* 모바일: 크기 최소화 & 바텀시트 위로 올림 */
@media (max-width: 768px) {
  #tile-switcher { bottom: 16px; right: 10px; }
  .tile-btn { font-size: 0.68rem; padding: 4px 8px; }
}
`;
document.head.appendChild(styleEl);

/* ══════════════════════════════════════
   카카오맵 연동
══════════════════════════════════════ */
let kakaoMapInst = null;   // kakao.maps.Map 인스턴스
let kakaoMode    = false;  // 현재 카카오맵 모드 여부
let kakaoSyncing = false;  // 이벤트 루프 방지 플래그

/** Leaflet zoom → Kakao level 변환 */
function toKakaoLevel(z) { return Math.max(1, Math.min(14, 19 - z)); }

/** Kakao level → Leaflet zoom 변환 */
function toLeafletZoom(l) { return Math.max(5, Math.min(18, 19 - l)); }

/** Leaflet 이동/줌 → 카카오 동기화 */
function syncL2K() {
  if (!kakaoMapInst || kakaoSyncing || !kakaoMode) return;
  kakaoSyncing = true;
  const c = map.getCenter();
  kakaoMapInst.setCenter(new kakao.maps.LatLng(c.lat, c.lng));
  kakaoMapInst.setLevel(toKakaoLevel(map.getZoom()));
  kakaoSyncing = false;
}

/** 카카오 이동/줌 → Leaflet 동기화 */
function syncK2L() {
  if (!kakaoMapInst || kakaoSyncing || !kakaoMode) return;
  kakaoSyncing = true;
  const c = kakaoMapInst.getCenter();
  map.setView([c.getLat(), c.getLng()], toLeafletZoom(kakaoMapInst.getLevel()), { animate: false });
  kakaoSyncing = false;
}

/** 카카오맵 SDK 동적 로드 → 콜백 실행 */
function loadKakaoSDK(callback) {
  if (typeof kakao !== 'undefined' && kakao.maps) { callback(); return; }
  const s = document.createElement('script');
  s.src = `//dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_APP_KEY}&autoload=false`;
  s.onerror = () => {
    alert('카카오맵 SDK 로드 실패.\nAPI 키와 허용 도메인을 확인해주세요.\n(카카오 개발자 콘솔 → 앱 설정 → 플랫폼 → Web)');
    deactivateKakaoMode(true);
  };
  s.onload = () => kakao.maps.load(callback);
  document.head.appendChild(s);
}

/** 카카오맵 인스턴스 초기화 (최초 1회) */
function initKakaoInst() {
  if (kakaoMapInst) return;
  const container = document.getElementById('kakao-map-container');
  const c = map.getCenter();
  kakaoMapInst = new kakao.maps.Map(container, {
    center: new kakao.maps.LatLng(c.lat, c.lng),
    level: toKakaoLevel(map.getZoom()),
  });
  // 카카오 → Leaflet 동기화
  kakao.maps.event.addListener(kakaoMapInst, 'center_changed', syncK2L);
  kakao.maps.event.addListener(kakaoMapInst, 'zoom_changed',   syncK2L);
  // Leaflet → 카카오 동기화
  map.on('moveend zoomend', syncL2K);
}

/** 카카오맵 모드 활성화 */
function activateKakaoMode() {
  if (!KAKAO_APP_KEY) {
    alert('KAKAO_APP_KEY가 비어 있습니다.\nindex.html 상단의 KAKAO_APP_KEY 값을 설정해주세요.');
    deactivateKakaoMode(true);
    return;
  }
  loadKakaoSDK(() => {
    initKakaoInst();
    kakaoMode = true;
    // Leaflet 타일 숨기기
    Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
    // 카카오 컨테이너 표시 & 배경 투명화
    document.getElementById('kakao-map-container').style.display = 'block';
    document.body.classList.add('kakao-mode');
    // 위치 동기화 & 레이아웃 갱신
    syncL2K();
    kakaoMapInst.relayout();
    _fallbackDone = true;
  });
}

/** 카카오맵 모드 비활성화 */
function deactivateKakaoMode(restoreCarto = false) {
  kakaoMode = false;
  document.getElementById('kakao-map-container').style.display = 'none';
  document.body.classList.remove('kakao-mode');
  if (restoreCarto) {
    TILES.carto.addTo(map);
    switcherEl.querySelectorAll('.tile-btn').forEach(b =>
      b.classList.toggle('active', b.dataset.tile === 'carto'));
  }
}

/* ── 타일 전환 UI ── */
const switcherEl = document.createElement('div');
switcherEl.id = 'tile-switcher';
switcherEl.innerHTML = `
  <button class="tile-btn" data-tile="kakao">🟡 카카오맵</button>
  <button class="tile-btn" data-tile="vworld">🗺️ 브이월드</button>
  <button class="tile-btn" data-tile="osm">🌐 OSM</button>
  <button class="tile-btn active" data-tile="carto">🎨 밝은지도</button>
`;
document.getElementById('map').appendChild(switcherEl);

switcherEl.querySelectorAll('.tile-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const key = btn.dataset.tile;

    // 버튼 상태 먼저 갱신
    switcherEl.querySelectorAll('.tile-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    if (key === 'kakao') {
      // 카카오맵 모드로 전환
      deactivateKakaoMode(false);  // 기존 Leaflet 타일 제거
      Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
      activateKakaoMode();
    } else {
      // 일반 Leaflet 타일 모드
      deactivateKakaoMode(false);
      Object.values(TILES).forEach(t => { if (map.hasLayer(t)) map.removeLayer(t); });
      TILES[key].addTo(map);
      document.body.classList.toggle('tile-osm', key === 'osm');
      _fallbackDone = (key !== 'vworld');
    }
  });
});
</script>
</body>
</html>
